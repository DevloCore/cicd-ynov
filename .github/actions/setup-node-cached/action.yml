name: Setup Node Cached
description: 'Configure Node.js avec cache et installe les dépendances avec npm ci'

inputs:
  node-version:
    description: 'Version de Node.js à installer'
    required: true
    default: '18'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'

    - name: Installation des dépendances
      run: npm ci
      shell: bash