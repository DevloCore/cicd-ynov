name: Advanced CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Installation des dépendances
        run: npm ci

      - name: Lint ESLint
        run: npm run lint

  test:
    name: Tests unitaires (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
      fail-fast: false
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js dynamique
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Installation des dépendances
        run: npm ci

      - name: Tests unitaires
        run: npm test

      - name: Upload rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 7

  deploy:
    name: Simulation Déploiement Production
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # Étape mise à jour pour générer le rapport visuel Markdown
      - name: Déploiement fictif et résumé du Pipeline
        run: |
          echo "======================================================="
          echo "🚀 Déploiement en cours sur l'environnement simulé..."
          echo "✅ Déploiement terminé avec succès !"
          echo "======================================================="
          
          # Écriture du résumé en Markdown dans le fichier spécial $GITHUB_STEP_SUMMARY
          echo "### 🚀 Résumé de l'exécution du Pipeline Avançé" >> $GITHUB_STEP_SUMMARY
          echo "Le pipeline s'est exécuté avec succès. Voici le statut des vérifications :" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Vérification | Statut |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧹 **Linting (ESLint)** | ✅ Validé sans erreur |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 **Tests (Node 18)** | ✅ 100% Passés |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 **Tests (Node 20)** | ✅ 100% Passés |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 **Déploiement Continu** | 🚀 Livré en Production Fictive |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 💡 _Rapport généré automatiquement par le pipeline à l'intention de l'équipe de développement._" >> $GITHUB_STEP_SUMMARY