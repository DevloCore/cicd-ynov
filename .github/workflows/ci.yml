name: Advanced CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Installation des dépendances
        run: npm ci

      - name: Lint ESLint
        run: npm run lint

  test:
    name: Tests unitaires (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
      fail-fast: false
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js dynamique
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Installation des dépendances
        run: npm ci

      - name: Tests unitaires
        run: npm test

      - name: Upload rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 7

      # BONUS S2 : Commenter la PR automatiquement avec le rapport (Uniquement si Node 20 pour éviter les doublons)
      - name: Commenter la PR avec la couverture
        if: github.event_name == 'pull_request' && matrix.node-version == 20
        uses: MishaKav/jest-coverage-comment@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          coverage-summary-path: ./coverage/coverage-summary.json

  deploy:
    name: Simulation Déploiement Production
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Déploiement fictif et résumé du Pipeline
        run: |
          echo "### 🚀 Résumé de l'exécution du Pipeline Avançé" >> $GITHUB_STEP_SUMMARY
          echo "Le pipeline s'est exécuté avec succès. Voici le statut des vérifications :" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Vérification | Statut |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧹 **Linting (ESLint)** | ✅ Validé sans erreur |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 **Tests (Node 18)** | ✅ 100% Passés |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 **Tests (Node 20)** | ✅ 100% Passés |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 **Déploiement Continu** | 🚀 Livré en Production Fictive |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 💡 _Rapport généré automatiquement par le pipeline à l'intention de l'équipe de développement._" >> $GITHUB_STEP_SUMMARY

  notify_failure:
    name: Notification Alerte Échec
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: failure()
    steps:
      - name: Simuler l'envoi d'une alerte (Slack/Mail)
        run: |
          echo "### 🚨 Pipeline en Échec !" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ Une ou plusieurs vérifications ont échoué (**Lint** ou **Tests**)." >> $GITHUB_STEP_SUMMARY
          echo "❌ Le déploiement automatique a été **bloqué** pour protéger la production." >> $GITHUB_STEP_SUMMARY