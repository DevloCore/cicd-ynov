name: Advanced CI/CD Pipeline with Docker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout initial
        uses: actions/checkout@v4

      - name: Initialisation Environnement
        uses: ./.github/actions/setup-node-cached
        with:
          node-version: '18'

      - name: Lint ESLint
        run: npm run lint

  test:
    name: Tests unitaires (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
      fail-fast: false
    steps:
      - name: Checkout initial
        uses: actions/checkout@v4

      - name: Initialisation Environnement
        uses: ./.github/actions/setup-node-cached
        with:
          node-version: ${{ matrix.node-version }}

      - name: Tests unitaires
        run: npm test

      - name: Upload rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 1

      - name: Commenter la PR avec la couverture
        if: github.event_name == 'pull_request' && matrix.node-version == 20
        uses: MishaKav/jest-coverage-comment@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          coverage-summary-path: ./coverage/coverage-summary.json

  docker_build_push:
    name: Build, Scan & Push Image Docker
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Passer le nom du dépôt en minuscules
        run: |
          echo "IMAGE_NAME_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Extraction des métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion au registre GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build de l'image Docker (Local pour Scan)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scanner l'image avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}:latest
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'
          severity: CRITICAL,HIGH

      - name: Upload rapport Trivy
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-results.sarif

      - name: Push de l'image Docker validée
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

  deploy_staging:
    name: Déploiement Staging
    runs-on: ubuntu-latest
    needs: [docker_build_push]
    environment: staging
    steps:
      - name: Déclencher le déploiement sur Render (Staging)
        run: |
          curl -X POST "${{ secrets.RENDER_STAGING_HOOK }}"

      - name: Health-check post-déploiement
        run: |
          echo "Attente du démarrage de l'application..."
          sleep 30
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://cicd-ynov-staging.onrender.com/health)
          if [ "$STATUS" -eq 200 ]; then
            echo "Staging opérationnel !"
          else
            echo "Erreur sur Staging : code $STATUS"
            exit 1
          fi

  deploy_production:
    name: Déploiement Production
    runs-on: ubuntu-latest
    needs: [deploy_staging]
    environment: production
    steps:
      - name: Déclencher le déploiement sur Render (Prod)
        run: |
          curl -X POST "${{ secrets.RENDER_PROD_HOOK }}"

      - name: Health-check post-déploiement
        run: |
          echo "Attente du démarrage de l'application..."
          sleep 30
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://cicd-ynov-prod.onrender.com/health)
          if [ "$STATUS" -eq 200 ]; then
            echo "Production opérationnelle !"
          else
            echo "Erreur sur la Production : code $STATUS"
            exit 1
          fi

  deploy:
    name: Simulation Déploiement Production
    runs-on: ubuntu-latest
    needs: [deploy_production]
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Déploiement fictif et résumé du Pipeline
        run: |
          TZ="Europe/Paris" CURRENT_DATE=$(date +"%d/%m/%Y à %H:%M:%S")
          
          echo "### 🚀 Résumé de l'exécution du Pipeline Express & Docker" >> $GITHUB_STEP_SUMMARY
          echo "Le pipeline s'est exécuté avec succès. L'image est disponible sur GHCR." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 📝 Informations de Build" >> $GITHUB_STEP_SUMMARY
          echo "- 👤 **Déclenché par l'événement :** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 🆔 **Commit SHA :** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 📅 **Date d'exécution :** $CURRENT_DATE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 📊 Statut des vérifications" >> $GITHUB_STEP_SUMMARY
          echo "| Vérification | Statut |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧹 **Linting (ESLint)** | ✅ Validé sans erreur |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 **Tests (Node 18)** | ✅ 100% Passés |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 **Tests (Node 20)** | ✅ 100% Passés |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 **Image Docker (GHCR)**| ✅ Construite et publiée avec succès |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 **Déploiement Continu** | 🚀 Livré en Production Fictive |" >> $GITHUB_STEP_SUMMARY

  notify_failure:
    name: Notification Alerte Échec
    runs-on: ubuntu-latest
    needs: [lint, test, docker_build_push, deploy_staging, deploy_production]
    if: failure()
    steps:
      - name: Simuler l'envoi d'une alerte
        run: |
          echo "### 🚨 Pipeline en Échec !" >> $GITHUB_STEP_SUMMARY
          echo "❌ Le déploiement automatique a été **bloqué** pour protéger la production." >> $GITHUB_STEP_SUMMARY