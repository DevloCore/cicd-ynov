name: Advanced CI/CD Pipeline with Docker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout initial
        uses: actions/checkout@v4

      - name: Initialisation Environnement
        uses: ./.github/actions/setup-node-cached
        with:
          node-version: '18'

      - name: Lint ESLint
        run: npm run lint

  test:
    name: Tests unitaires (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
      fail-fast: false
    steps:
      - name: Checkout initial
        uses: actions/checkout@v4

      - name: Initialisation Environnement
        uses: ./.github/actions/setup-node-cached
        with:
          node-version: ${{ matrix.node-version }}

      - name: Tests unitaires
        run: npm test

      - name: Upload rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 1

      - name: Commenter la PR avec la couverture
        if: github.event_name == 'pull_request' && matrix.node-version == 20
        uses: MishaKav/jest-coverage-comment@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          coverage-summary-path: ./coverage/coverage-summary.json

  # 🐳 JOB DOCKER : Construction et publication sur GHCR
  docker_build_push:
    name: Build & Push Image Docker
    runs-on: ubuntu-latest
    needs: [lint, test] # L'image ne se construit que si la CI classique est verte
    permissions:
      contents: read
      packages: write # Indispensable pour pousser sur le registre GitHub Packages
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # Configuration de Docker Buildx (permet d'utiliser les fonctions de cache avancées)
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Connexion au GitHub Container Registry (GHCR) avec le token magique du runner
      - name: Connexion au registre GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extraction des tags automatiques (:latest et :SHA-du-commit)
      - name: Extraction des métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      # Construction et envoi avec le cache GitHub Actions (gha) intégré
      - name: Build et Push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ id.meta.outputs.tags }}
          labels: ${{ id.meta.outputs.labels }}
          cache-from: type=gha # Cache Docker optimisé pour GitHub Actions
          cache-to: type=gha,mode=max

  deploy:
    name: Simulation Déploiement Production
    runs-on: ubuntu-latest
    needs: [docker_build_push] # La production attend maintenant que l'image Docker soit publiée !
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Déploiement fictif et résumé du Pipeline
        run: |
          TZ="Europe/Paris" CURRENT_DATE=$(date +"%d/%m/%Y à %H:%M:%S")
          
          echo "### 🚀 Résumé de l'exécution du Pipeline Express & Docker" >> $GITHUB_STEP_SUMMARY
          echo "Le pipeline s'est exécuté avec succès. L'image est disponible sur GHCR." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 📝 Informations de Build" >> $GITHUB_STEP_SUMMARY
          echo "- 👤 **Déclenché par l'événement :** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 🆔 **Commit SHA :** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- 📅 **Date d'exécution :** $CURRENT_DATE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 📊 Statut des vérifications" >> $GITHUB_STEP_SUMMARY
          echo "| Vérification | Statut |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧹 **Linting (ESLint)** | ✅ Validé sans erreur |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 **Tests (Node 18)** | ✅ 100% Passés |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 **Tests (Node 20)** | ✅ 100% Passés |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 **Image Docker (GHCR)**| ✅ Construite et publiée avec succès |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 **Déploiement Continu** | 🚀 Livré en Production Fictive |" >> $GITHUB_STEP_SUMMARY

  notify_failure:
    name: Notification Alerte Échec
    runs-on: ubuntu-latest
    needs: [lint, test, docker_build_push]
    if: failure()
    steps:
      - name: Simuler l'envoi d'une alerte
        run: |
          echo "### 🚨 Pipeline en Échec !" >> $GITHUB_STEP_SUMMARY
          echo "❌ Le déploiement automatique a été **bloqué** pour protéger la production." >> $GITHUB_STEP_SUMMARY